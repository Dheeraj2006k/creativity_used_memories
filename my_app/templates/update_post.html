{% extends 'base.html' %}

{% block title %}
<title>Update Post</title>
{% endblock title%}

{% block content %}
    <section class="form-shell">
        <div class="form-card">
            <h1>Update Post</h1>
            <p>Edit the post details and save your changes.</p>
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="action-row mt-4">
                    <button class="btn btn-primary" type="submit">Update</button>
                    <a href="{% url 'posts' %}" class="btn btn-outline-secondary">Back to Posts</a>
                </div>
            </form>
        </div>
    </section>
{% endblock content %}
