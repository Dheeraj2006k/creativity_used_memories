{% extends  'base.html' %}

{% block title %}
Create Post
{% endblock title%}

{% block  content %}
    <section class="form-shell">
        <div class="form-card">
            <p class="section-kicker">New memory</p>
            <h1 class="form-title">Create a post your friends will remember.</h1>
            <p class="form-text">Add a title, a short subtitle, your story, and the photo that captures the mood.</p>
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="inline-actions mt-4">
                    <button class="btn btn-success" type="submit">Publish Post</button>
                    <a href="{% url 'posts' %}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </section>
{% endblock content %}
