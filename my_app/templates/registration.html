{% extends  'base.html' %}

{% block title %}
<title class="form_label">Register - My Django App</title>
{% endblock %}

{% block  content %}
    <section class="form-shell">
        <div class="form-card">
            <h1>Register</h1>
            <p>Create your account to start sharing posts.</p>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="action-row mt-4">
                    <button class="btn btn-success" type="submit">Register</button>
                    <a href="{% url 'login' %}" class="btn btn-outline-secondary">Already have an account?</a>
                </div>
            </form>
        </div>
    </section>
{% endblock content %}
